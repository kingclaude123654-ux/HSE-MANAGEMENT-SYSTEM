name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Java Development Kit
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install and Cache Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Fetch App Dependencies
        run: flutter pub get

      - name: Compile Release APK Matrix
        run: flutter build apk --release

      - name: Distribute Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: incident-report-pro-apk
          path: build/app/outputs/flutter-apk/app-release.apk
