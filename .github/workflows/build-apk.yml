name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Java Development Kit
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install and Cache Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: 'stable'
          cache: true

      - name: Repair and Recreate Modern Android Project Wrap
        run: |
          rm -rf android
          flutter create . --platforms=android --project-name=incident_report_pro

      - name: Inject Camera and Storage Permissions into Fresh Template
        run: |
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          PERMISSIONS='<uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />'
          
          # Use sed to safely inject the hardware permission lines right under the opening <manifest> tag
          sed -i "s|<manifest[^>]*>|&\n    $PERMISSIONS|" $MANIFEST_PATH
          
          echo "Permissions successfully injected into fresh Android Manifest."

      - name: Fetch App Dependencies
        run: flutter pub get

      - name: Compile Release APK Matrix
        run: flutter build apk --release

      - name: Distribute Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: incident-report-pro-apk
          path: build/app/outputs/flutter-apk/app-release.apk
